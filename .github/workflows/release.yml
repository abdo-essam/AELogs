name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Publish to Maven Central
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate version matches gradle.properties
        run: |
          EXPECTED="${{ steps.version.outputs.VERSION }}"
          ACTUAL=$(grep "VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Tag version ($EXPECTED) doesn't match gradle.properties ($ACTUAL)"
            exit 1
          fi

      - name: Run Full Test Suite
        run: ./gradlew allTests

      - name: Decode GPG signing key
        run: |
          echo "ORG_GRADLE_PROJECT_signingInMemoryKey<<SIGNING_KEY_EOF" >> $GITHUB_ENV
          echo "$SIGNING_KEY_BASE64" | base64 -d >> $GITHUB_ENV
          echo "SIGNING_KEY_EOF" >> $GITHUB_ENV
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}

      - name: Publish to Maven Central
        run: ./gradlew :logs:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          token: ${{ secrets.GITHUB_TOKEN }}
