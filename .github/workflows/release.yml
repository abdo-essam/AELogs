name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:

    name: 🚀 Publish to Maven Central
    runs-on: macos-14  # Need macOS for iOS targets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate version matches gradle.properties
        run: |
          EXPECTED="${{ steps.version.outputs.VERSION }}"
          ACTUAL=$(grep "VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Tag version ($EXPECTED) doesn't match gradle.properties ($ACTUAL)"
            exit 1
          fi

      - name: Run Full Test Suite
        run: ./gradlew allTests

      - name: Debug signing config
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "❌ SIGNING_KEY is empty"
          else
            echo "✅ SIGNING_KEY is set (${#SIGNING_KEY} chars)"
          fi
          if [ -z "$SIGNING_KEY_ID" ]; then
            echo "❌ SIGNING_KEY_ID is empty"
          else
            echo "✅ SIGNING_KEY_ID is set: $SIGNING_KEY_ID"
          fi
          if [ -z "$SIGNING_PASSWORD" ]; then
            echo "❌ SIGNING_PASSWORD is empty"
          else
            echo "✅ SIGNING_PASSWORD is set"
          fi
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}


      - name: Publish to Maven Central
        run: ./gradlew :devlens:publishAllPublicationsToSonatypeRepository
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          token: ${{ secrets.GITHUB_TOKEN }}
