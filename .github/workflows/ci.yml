name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ── Code Quality ─────────────────────────────────────
  quality:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Check API compatibility
        run: ./gradlew apiCheck

  # ── Build & Test (Android + JVM) ─────────────────────
  build-android:
    name: 🤖 Android Build & Test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew :devlens:assembleAndroidMain

      - name: Unit Tests & Coverage
        run: ./gradlew :devlens:desktopTest :devlens:koverXmlReport

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: devlens/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-android
          path: devlens/build/reports/tests/

  # ── Build & Test (iOS) ──────────────────────────────
  build-ios:
    name: 🍎 iOS Build & Test
    runs-on: macos-14
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build iOS Framework
        run: ./gradlew :devlens:linkReleaseFrameworkIosArm64

      - name: iOS Tests
        run: ./gradlew :devlens:iosSimulatorArm64Test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: devlens/build/reports/tests/

  # ── Sample App Build ─────────────────────────────────
  sample:
    name: 📱 Sample App
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build Sample
        run: ./gradlew :sample:composeApp:assembleDebug

  # ── Size Report ──────────────────────────────────────
  size:
    name: 📏 Binary Size
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build AAR
        run: ./gradlew :devlens:bundleAndroidMainAar

      - name: Report Size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'devlens/build/outputs/aar/';
            if (!fs.existsSync(path)) { console.log('AAR not found, skipping.'); return; }
            const files = fs.readdirSync(path);
            const aar = files.find(f => f.endsWith('.aar'));
            if (!aar) { console.log('No AAR file found, skipping.'); return; }
            const stats = fs.statSync(path + aar);
            const sizeKB = (stats.size / 1024).toFixed(1);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📏 **Library Size**: ${sizeKB} KB (${aar})`
            });
