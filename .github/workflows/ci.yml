name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ── Code Quality ─────────────────────────────────────
  quality:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Apply formatting
        run: ./gradlew spotlessApply

      - name: Update API dumps
        run: ./gradlew apiDump

      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto format and api dump [skip ci]"

  # ── Build & Test (Android + JVM) ─────────────────────
  build-android:
    name: 🤖 Android Build & Test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew assemble

      - name: Unit Tests
        run: ./gradlew jvmTest testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-android
          path: '**/build/reports/tests/'

  # ── Build & Test (iOS) ──────────────────────────────
  build-ios:
    name: 🍎 iOS Build & Test
    runs-on: macos-14
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build iOS Framework
        run: ./gradlew compileKotlinIosArm64

      - name: iOS Tests
        run: ./gradlew iosSimulatorArm64Test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: '**/build/reports/tests/'

  # ── Sample App Build ─────────────────────────────────
  sample:
    name: 📱 Sample App
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build Sample
        run: ./gradlew :sample:composeApp:assembleDebug


