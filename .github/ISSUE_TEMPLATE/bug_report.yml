name: 🐛 Bug Report
description: Report a bug in AELogs
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: version
    attributes:
      label: AELogs Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Desktop (JVM)
        - All
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Kotlin: 
        - Compose Multiplatform: 
        - Android SDK: 
        - Xcode: 
        - Device/Emulator: 

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Stack Trace
      render: shell

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Minimal reproducible code
      render: kotlin
